<div class="listings-card my-4 card shadow-sm">

  <!-- Header -->
  <div class="card-header">
    <h2 class="card-title">Active listings</h2>
  </div>

  <div class="plot-list">
    <div
      class="plot-item"
      *ngFor="let plot of plots; let last = last"
      [class.no-border]="last"
      (click)="onPlotClick(plot)"
      role="button"
      [attr.aria-label]="plot.title + ' - ' + plot.price"
      tabindex="0"
      (keydown.enter)="onPlotClick(plot)"
    >

      
      <div class="plot-icon" [ngClass]="getIconClass(plot.iconType)">
        <svg *ngIf="plot.iconType === 'residential'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
        </svg>
        <svg *ngIf="plot.iconType === 'corner'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <svg *ngIf="plot.iconType === 'commercial'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
        </svg>
        <svg *ngIf="plot.iconType === 'farmhouse'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
      </div>

      <div class="plot-info">
        <p class="plot-title">{{ plot.title }}</p>
        <p class="plot-location">{{ plot.location }}</p>
      </div>

      
      <div class="plot-right text-end">
        <p class="plot-price">{{ plot.price }}</p>
        <span class="status-badge" [ngClass]="getStatusClass(plot.status)">
          {{ plot.status }}
        </span>
      </div>

    </div>
  </div>

</div>
