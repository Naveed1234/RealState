<div class="login-page">
  <div class="login-bg-overlay"></div>
  <div class="login-card card shadow-sm">
    <div class="card-body">
      <div class="text-center mb-4">
        <div class="login-logo mx-auto mb-3">
          <img src="assets/man.png" alt="User avatar" class="login-logo-img" />
        </div>
        <h1 class="h3 mb-2">Login</h1>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text">@</span>
            <input id="email" type="email" formControlName="email" class="form-control" [class.is-invalid]="submitted && f['email'].invalid" placeholder="Email ID">
            <div class="invalid-feedback" *ngIf="submitted && f['email'].invalid">
              <div *ngIf="f['email'].errors?.['required']">Email is required.</div>
              <div *ngIf="f['email'].errors?.['email']">Enter a valid email address.</div>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text">🔒</span>
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" class="form-control" [class.is-invalid]="submitted && f['password'].invalid" placeholder="Password">
            <button type="button" class="btn btn-outline-secondary" (click)="togglePassword()" [attr.aria-pressed]="showPassword">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
            <div class="invalid-feedback" *ngIf="submitted && f['password'].invalid">
              <div *ngIf="f['password'].errors?.['required']">Password is required.</div>
              <div *ngIf="f['password'].errors?.['minlength']">Password must be at least 5 characters.</div>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input id="rememberMe" class="form-check-input" type="checkbox" formControlName="rememberMe">
            <label class="form-check-label" for="rememberMe">Remember me</label>
          </div>
          <a href="#" class="small">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-login w-100">Login</button>

        <div class="text-center mt-4 small text-muted">
          Don't have an account? <a href="#">Register</a>
        </div>

        <div *ngIf="loginSuccess" class="alert alert-success mt-4 mb-0" role="alert">
          Login successful. Redirecting...
        </div>
      </form>
    </div>
  </div>
</div>
